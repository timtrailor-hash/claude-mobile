name: ratchet
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  monolith-ratchet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve baseline (embedded only — slice 1b plan §11.2)
        run: |
          # Embedded baseline is the sole source of truth.
          # Cross-repo controlplane mirror DROPPED 2026-04-27 after the
          # 09:55 BST false-fail incident (controlplane baseline lagged
          # the embedded one by 3 minutes; ratchet flagged the gap).
          # Plan §11.2 makes the embedded baseline authoritative.
          if [ ! -f .conv_server_baseline ]; then
            echo "FAIL: .conv_server_baseline missing"
            exit 1
          fi
          BASELINE=$(tr -d '[:space:]' < .conv_server_baseline)
          if ! [[ "$BASELINE" =~ ^[0-9]+$ ]]; then
            echo "FAIL: embedded baseline non-numeric: $BASELINE"
            exit 1
          fi
          echo "Resolved baseline: $BASELINE (embedded)"

      - name: Enforce ratchet
        run: |
          BASELINE=$(tr -d '[:space:]' < .conv_server_baseline)
          LINES=$(wc -l < conversation_server.py | tr -d '[:space:]')
          echo "conversation_server.py = $LINES lines; baseline = $BASELINE"
          if [ "$LINES" -gt "$BASELINE" ]; then
            echo ""
            echo "FAIL: conversation_server.py grew $BASELINE -> $LINES."
            echo "Phase 3 decomposition requires the monolith to only shrink."
            echo "Extract lines into conv/*.py or justify and bump the baseline."
            exit 1
          fi
          echo "OK: ratchet green ($LINES <= $BASELINE)"

