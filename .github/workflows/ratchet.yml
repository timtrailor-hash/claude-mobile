name: ratchet
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  monolith-ceiling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce monolith ceiling (7000 lines)
        run: |
          # Replaced 2026-04-28: was a strict "monotonically decrease" ratchet
          # against an embedded baseline. That fired on every minor hotfix
          # (e.g. 2026-04-27 + 2026-04-28 mornings — comment-line growth in
          # safety patches triggered false alerts). The decomposition is now
          # mostly done; we are in maintenance mode. The new policy: alert
          # only if the monolith balloons past a hard ceiling that gives
          # legitimate hotfixes ~1300 lines of headroom from the post-slice-1L
          # baseline of 5663.
          #
          # If this fires, someone added a chunk of code to the monolith
          # instead of extracting it into a conv/* slice. Either extract,
          # or — if the addition is genuinely core (subprocess lifecycle,
          # session state, permission bridge) — raise the ceiling with a
          # commit explaining why.
          CEILING=7000
          LINES=$(wc -l < conversation_server.py | tr -d '[:space:]')
          echo "conversation_server.py = $LINES lines; ceiling = $CEILING"
          if [ "$LINES" -gt "$CEILING" ]; then
            echo ""
            echo "FAIL: conversation_server.py is $LINES lines, exceeds ceiling $CEILING."
            echo "Either extract code into a conv/<slice>/ package, or raise the"
            echo "ceiling in this workflow with a justifying commit message."
            exit 1
          fi
          echo "OK: $LINES <= $CEILING"
